ekf_filter_node:
  ros__parameters:
    frequency: 20.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    # Odometry (from CoppeliaSim)
    odom0: odometry
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,  # vx, vy
                   false, false, true,   # v_yaw
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # Pose (from Particle Filter)
    pose0: pose_cov
    pose0_config: [true,  true,  false,  # x, y
                   false, false, true,   # yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_queue_size: 10
    pose0_differential: false
    pose0_relative: false

    publish_tf: true
    publish_acceleration: false